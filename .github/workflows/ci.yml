name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - fy-blog

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 运行验证门禁
        run: npm run ci
